# ========== Database (PostgreSQL + TimescaleDB) ==========
db.url=jdbc:postgresql://localhost:5432/fno_oms
db.username=fnooms
db.password=fnooms123
db.pool.maxSize=10
db.pool.minIdle=2
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000

# ========== Application ==========
app.name=FnO OMS
app.version=1.0.0
app.contextPath=/fno-oms

# ========== Async Queue Capacities ==========
# Order queue: bounded to backpressure at extreme load
queue.order.capacity=10000
# Audit queue: higher capacity, can be lossy under extreme load
queue.audit.capacity=50000
# Tick queue: high throughput for quote ticks
queue.tick.capacity=100000

# ========== Tick Batch Writer ==========
# Max ticks per batch INSERT
tick.batch.size=500
# Flush interval in milliseconds
tick.batch.flush.ms=500

# ========== Broker API Defaults ==========
# mStock API base URL
mstock.base.url=https://api.mstock.trade/openapi/typeb
mstock.api.version=1
