<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock WebSocket Client</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        #logs { white-space: pre-wrap; height: 400px; overflow-y: scroll; background: #000; padding: 10px; border: 1px solid #333; }
        input, button { padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>MStock Binary Mock Data Tester</h2>
    <input type="text" id="wsUrl" value="ws://localhost:8081" size="30">
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
    <div id="status">Status: Disconnected</div>
    <div id="logs"></div>

    <script>
        let ws;
        const logs = document.getElementById('logs');
        const status = document.getElementById('status');

        function log(msg) {
            logs.innerHTML += msg + "\n";
            logs.scrollTop = logs.scrollHeight;
        }

        function connect() {
            const url = document.getElementById('wsUrl').value;
            ws = new WebSocket(url);
            ws.binaryType = "arraybuffer"; // Expect binary

            ws.onopen = () => {
                status.innerText = "Status: Connected to " + url;
                log("Connected...");
            };

            ws.onclose = () => {
                status.innerText = "Status: Disconnected";
                log("Disconnected.");
            };

            ws.onerror = (e) => {
                log("Error: " + e);
            };

            ws.onmessage = (event) => {
                if (typeof event.data === "string") {
                    log("Received Text: " + event.data);
                } else {
                    // Binary packet
                    const buffer = event.data;
                    const dataView = new DataView(buffer);
                    const packetSize = 379;
                    const numPackets = buffer.byteLength / packetSize;
                    
                    log(`Received Binary Batch: ${buffer.byteLength} bytes (${numPackets} packets)`);
                    
                    for (let i = 0; i < numPackets; i++) {
                        let offset = i * packetSize;
                        
                        // Parse according to MStock format (LITTLE_ENDIAN)
                        // byte 0: exchange_type
                        const exType = dataView.getInt8(offset);
                        // bytes 1-30: token (string)
                        const tokenBytes = new Uint8Array(buffer, offset + 1, 30);
                        const token = new TextDecoder().decode(tokenBytes).replace(/\u0000/g, '');
                        // LTP is at offset 31 (8 bytes double)
                        const ltp = dataView.getFloat64(offset + 31, true); // true = little endian
                        
                        log(`  -> Packet [Token: ${token}, LTP: ${ltp.toFixed(2)}]`);
                    }
                }
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
    </script>
</body>
</html>
